name: CDK tests

# Disabled - uncomment to re-enable
# on:
#   pull_request:
#     branches:
#       - main
#       - v1
#       - v3
#   workflow_dispatch: {}

on:
  workflow_dispatch: {}  # Manual trigger only

jobs:
  cdk-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - run: |
          cd cdk
          npm ci
          npx cdk synth
  cdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"
      - run: |
          cd cdk
          npm ci
          npm run test
